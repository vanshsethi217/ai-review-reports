name: AI Security Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger AI review
        run: |
          curl -X POST https://ogle-gratified-imperial.ngrok-free.dev/scan-pr \
            -H "Content-Type: application/json" \
            -d '{"owner": "${{ github.repository_owner }}", "repo": "${{ github.event.repository.name }}", "pr_number": ${{ github.event.pull_request.number }}, "prompt": "security vulnerabilities"}'
